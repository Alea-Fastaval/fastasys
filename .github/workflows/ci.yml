name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: "Backend: Build & Test (matrix .NET)"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version:
          - "9.0.x"
          - "10.0.x"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore .NET dependencies
        run: dotnet restore backend/Fastasys.sln

      - name: Build .NET solution
        run: dotnet build backend/Fastasys.sln --no-restore -c Release

      - name: Run .NET tests (produce TRX)
        run: |
          mkdir -p artifacts/backend-test-results
          dotnet test backend/Fastasys.sln --no-build -c Release --logger "trx;LogFileName=backend-test-results-${{ matrix.dotnet-version }}.trx" --results-directory ./artifacts/backend-test-results

      - name: Upload backend test results (TRX)
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-${{ matrix.dotnet-version }}
          path: artifacts/backend-test-results

  frontend:
    name: "Frontend: Build & Test (Angular)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
